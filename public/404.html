<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OTP</title>
    <script>
      // GitHub Pages SPA redirect (sessionStorage approach).
      // Stores the full path + search + hash in sessionStorage, then redirects
      // to the repo root. index.html picks it up and restores the URL via
      // history.replaceState before the React app boots — no visible URL flash.
      (function () {
        var segmentCount = 1; // number of path segments to keep (repo name)
        var loc = window.location;
        var pathSegments = loc.pathname.split('/');
        var kept = pathSegments.slice(0, segmentCount + 1).join('/') || '/';
        var rest = '/' + pathSegments.slice(segmentCount + 1).join('/');
        var payload = rest + (loc.search || '') + (loc.hash || '');
        try { sessionStorage.setItem('__spa_redirect', payload); } catch (e) {}
        loc.replace(kept + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
