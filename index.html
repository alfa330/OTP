<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body class="bg-gray-50 font-sans antialiased text-gray-900">
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect handler
      // Decodes the __spa_path query parameter set by 404.html and restores
      // the correct URL via history.replaceState before the app loads.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var spaPath = params.get('__spa_path');
        if (spaPath) {
          params.delete('__spa_path');
          var decoded = decodeURIComponent(spaPath);
          var base = window.location.pathname.replace(/\/$/, '');
          var remaining = params.toString();
          var newUrl = base + decoded + (remaining ? '?' + remaining : '') + window.location.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
