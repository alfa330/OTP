<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCORE</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DDGZC3W1MZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // send_page_view: false — page_view шлётся вручную из приложения с корректным
      // page_title (см. trackAppViewAnalytics в src/App.jsx). Иначе на загрузке
      // улетал бы лишний page_view со статичным title "iCORE".
      gtag('config', 'G-DDGZC3W1MZ', { send_page_view: false });
    </script>
  </head>
  <body class="bg-gray-50 font-sans antialiased text-gray-900">
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect handler (sessionStorage approach).
      // Reads the redirect path stored by 404.html and restores it via
      // history.replaceState before the React app boots.
      (function () {
        try {
          var redirect = sessionStorage.getItem('__spa_redirect');
          if (redirect) {
            sessionStorage.removeItem('__spa_redirect');
            var base = window.location.pathname.replace(/\/$/, '');
            window.history.replaceState(null, '', base + redirect);
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
